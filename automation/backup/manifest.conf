# Что бэкапить. Правится отдельно от логики — добавление пути не требует
# трогать backup.sh.
#
# Один зашифрованный restic-репозиторий на всё: restic шифрует на клиенте, так
# что данные и секреты (ssh-ключи, .env) едут вместе безопасно. Отдельный слой
# и tar с шифрованием, которые были при rsync, больше не нужны.
#
# EXCLUDES — маски restic --exclude, применяются ко всем путям.

BACKUP_PATHS=(
  "$HOME/KnowledgeBase"          # Obsidian vault
  "$HOME/Documents"              # книги, личные документы
  "$HOME/Projects"               # включая design.md и подобное, что уже терялось
  "$HOME/Work"
  "$HOME/Recordings"             # записи звонков, их использует скилл c-call
  "$HOME/.ssh"                   # приватные ключи
  "$HOME/.local/share/atuin/key" # E2E-ключ atuin, невосстановим
  "$HOME/.dotfiles/.env"         # несекретная часть + токены до переезда в rbw
  # настройки BetterDisplay: в репо не держим (EDID, серийники, лицензия)
  "$HOME/Library/Preferences/pro.betterdisplay.BetterDisplay.plist"
)

EXCLUDES=(
  ".DS_Store"
  "node_modules"
  ".venv"
  "__pycache__"
  "*.pyc"
  ".terraform"
  ".devpod"
  "*.before-dotfiles"
)
