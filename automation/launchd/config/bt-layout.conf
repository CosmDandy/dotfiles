# Bluetooth Keyboard Layout Switcher Config
#
# KEYBOARD_MAC: MAC address of your Bluetooth keyboard
#   Get it from: System Settings → Bluetooth (hover/click the keyboard)
#   Or run from Ghostty: /opt/homebrew/bin/blueutil --paired
#
KEYBOARD_MAC="d4:e2:f6:9d:fe:cc"

# Custom layout (Ukulele-created Russian layout)
CUSTOM_LAYOUT="org.sil.ukelele.keyboardlayout.graphitenew.russian"

# Default layout when keyboard is not connected
DEFAULT_LAYOUT="com.apple.keylayout.Russian"
