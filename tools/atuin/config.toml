# Atuin — история команд с синхронизацией на свой сервер.
# Полный справочник опций: https://docs.atuin.sh/configuration/config/

auto_sync = true
update_check = true
sync_address = "https://atuin.cosmdandy.ru"
sync_frequency = "30m"

search_mode = "fuzzy"
filter_mode = "host"

style = "full"
inline_height = 0 # 0 = всегда фулскрин
ctrl_n_shortcuts = true # ctrl+1..9 вместо alt для числовых шорткатов
show_help = false
show_tabs = false

# не сохранять команды, совпавшие с дефолтными regex секретов (AWS, GH PAT, Slack, Stripe)
secrets_filter = true
# Enter сразу выполняет команду; Tab — вернуть в шелл для правки
enter_accept = true

[stats]
ignored_commands = [
  "cd",
  "ls",
  "vi",
  "c",
  "e",
  "ds",
  "dpd",
  "v"
]

[keys]
prefix = 'h'

[sync]
records = true
