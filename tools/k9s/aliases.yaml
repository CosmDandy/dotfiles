# k9s resource aliases — только кастомные короткие имена для :-команды.
# Встроенные shortnames kubectl/k9s (sts, ds, cm, sec, pvc, ing, crd, …)
# k9s понимает и без алиасов.
aliases:
  # Workloads
  dp: deployments
  # Network
  np: networkpolicies
  # RBAC (у kubectl shortnames нет)
  ro: roles
  rb: rolebindings
  cr: clusterroles
  crb: clusterrolebindings
  # GitOps CRDs (Flux / ArgoCD)
  ks: kustomizations
  hr: helmreleases
  gitrepo: gitrepositories
  app: applications
  appproj: appprojects
