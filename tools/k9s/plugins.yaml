# k9s plugins. Шорткаты на Ctrl-*, чтобы не конфликтовать с сортировкой (Shift-*)
# и встроенными клавишами k9s. Бинарники ставятся через nix (darwin/linux).
plugins:
  # Мультипод-логи через stern
  stern:
    shortCut: Ctrl-L
    description: Stern logs
    scopes:
      - pods
    command: stern
    background: false
    args:
      - --tail
      - "50"
      - --context
      - $CONTEXT
      - -n
      - $NAMESPACE
      - $NAME

  # Чистый YAML без managedFields/status (kubectl-neat)
  neat:
    shortCut: Ctrl-N
    description: Neat YAML
    scopes:
      - pods
      - deployments
      - statefulsets
      - daemonsets
      - services
      - configmaps
      - secrets
      - ingresses
      - jobs
      - cronjobs
    command: bash
    background: false
    args:
      - -c
      - "kubectl get $RESOURCE_NAME $NAME -n $NAMESPACE --context $CONTEXT -o yaml | kubectl neat | less -R"

  # Скан уязвимостей образа (trivy). Из вью контейнеров — $COL-IMAGE.
  trivy:
    shortCut: Ctrl-T
    description: Trivy scan
    scopes:
      - containers
    command: bash
    background: false
    args:
      - -c
      - "trivy image $COL-IMAGE | less -R"

  # Анализ слоёв образа (dive). Нужен docker (OrbStack).
  dive:
    shortCut: Ctrl-Y
    description: Dive image
    scopes:
      - containers
    command: dive
    background: false
    args:
      - $COL-IMAGE

  # Flux: reconcile Kustomization
  flux-reconcile-ks:
    shortCut: Ctrl-R
    description: Flux reconcile
    scopes:
      - kustomizations
    command: flux
    background: false
    args:
      - reconcile
      - kustomization
      - $NAME
      - -n
      - $NAMESPACE
      - --context
      - $CONTEXT

  # Flux: reconcile HelmRelease
  flux-reconcile-hr:
    shortCut: Ctrl-R
    description: Flux reconcile
    scopes:
      - helmreleases
    command: flux
    background: false
    args:
      - reconcile
      - helmrelease
      - $NAME
      - -n
      - $NAMESPACE
      - --context
      - $CONTEXT

  # ArgoCD: sync приложения (нужен argocd login)
  argocd-sync:
    shortCut: Ctrl-O
    description: ArgoCD sync
    scopes:
      - applications
    command: argocd
    background: false
    confirm: true
    args:
      - app
      - sync
      - $NAME

  # Debug-шелл на ноде через netshoot (ephemeral container)
  node-debug:
    shortCut: Ctrl-G
    description: Node netshoot
    scopes:
      - nodes
    command: kubectl
    background: false
    args:
      - debug
      - node/$NAME
      - -it
      - --context
      - $CONTEXT
      - --image
      - nicolaka/netshoot:latest

  # События по выбранному объекту
  events:
    shortCut: Ctrl-V
    description: Watch events
    scopes:
      - pods
      - deployments
      - statefulsets
      - daemonsets
      - nodes
    command: bash
    background: false
    args:
      - -c
      - "kubectl get events -n $NAMESPACE --context $CONTEXT --field-selector involvedObject.name=$NAME -w"
