# k9s hotkeys — быстрые прыжки в частые вьюхи.
# Shift-<цифра> выбран намеренно: буквы заняты сортировкой колонок (Shift-N/C/M…).
hotKeys:
  shift-1:
    shortCut: Shift-1
    description: Pods
    command: pods
  shift-2:
    shortCut: Shift-2
    description: Deployments
    command: deployments
  shift-3:
    shortCut: Shift-3
    description: Services
    command: services
  shift-4:
    shortCut: Shift-4
    description: StatefulSets
    command: statefulsets
  shift-5:
    shortCut: Shift-5
    description: ConfigMaps
    command: configmaps
  shift-6:
    shortCut: Shift-6
    description: Secrets
    command: secrets
  shift-7:
    shortCut: Shift-7
    description: Ingresses
    command: ingresses
  shift-8:
    shortCut: Shift-8
    description: Nodes
    command: nodes
  shift-9:
    shortCut: Shift-9
    description: Namespaces
    command: namespaces
  shift-0:
    shortCut: Shift-0
    description: Events
    command: events
