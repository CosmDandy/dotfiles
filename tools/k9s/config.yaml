k9s:
  liveViewAutoRefresh: true
  refreshRate: 2
  maxConnRetry: 5
  readOnly: false
  noExitOnCtrlC: false
  ui:
    enableMouse: false
    headless: false
    logoless: false
    crumbsless: false
    reactive: true
    noIcons: false
    skin: solarized
  skipLatestRevCheck: false
  disablePodCounting: false
  shellPod:
    image: nicolaka/netshoot:latest
    namespace: default
    limits:
      cpu: 200m
      memory: 200Mi
  imageScans:
    enable: true
  logger:
    tail: 200
    buffer: 5000
    sinceSeconds: -1
    textWrap: false
    showTime: false
  thresholds:
    cpu:
      critical: 90
      warn: 70
    memory:
      critical: 90
      warn: 70
