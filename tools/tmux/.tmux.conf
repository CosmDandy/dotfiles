unbind r
bind-key -r r source-file ~/.tmux.conf

bind-key y select-pane -L
bind-key h select-pane -D
bind-key a select-pane -U
bind-key e select-pane -R

# Бесшовная навигация nvim-сплиты <-> tmux-пейны (vim-tmux-navigator).
# Если в активном пейне запущен (n)vim — пробрасываем Ctrl-клавишу внутрь
# (nvim прыгает по сплиту), иначе сам select-pane. Раскладка y/h/a/e.
# ВНИМАНИЕ: C-a/C-e/C-y в не-vim пейнах перехватываются здесь и больше не
# работают как readline begin/end-of-line/yank.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?|fzf)$'"
bind-key -n 'C-y' if-shell "$is_vim" 'send-keys C-y' 'select-pane -L'
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -D'
bind-key -n 'C-a' if-shell "$is_vim" 'send-keys C-a' 'select-pane -U'
bind-key -n 'C-e' if-shell "$is_vim" 'send-keys C-e' 'select-pane -R'
bind-key -T copy-mode-vi 'C-y' select-pane -L
bind-key -T copy-mode-vi 'C-h' select-pane -D
bind-key -T copy-mode-vi 'C-a' select-pane -U
bind-key -T copy-mode-vi 'C-e' select-pane -R

# Split panes
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ============================================================================
# SESSION MANAGEMENT
# ============================================================================

# Create new session with prefix + S
bind S command-prompt -p "New session:" "new-session -A -s '%%'"

# Kill current session with prefix + X
bind X confirm-before -p "kill-session #S? (y/n)" kill-session

# Switch to last session with prefix + L
bind L switch-client -l

# prefix + s: динамическое меню сессий с прямым прыжком по горячей клавише.
bind s run-shell '~/.dotfiles/tools/tmux/session-menu.sh'

# Don't exit tmux when closing a session (switch to another instead)
set -g detach-on-destroy off

# Автоматическое именование новых сессий по названию директории
set-hook -g session-created "rename-session '#{s/^[.]//:#{b:pane_current_path}}'"

# SSH agent forwarding — update env on reattach
set -g update-environment "SSH_AUTH_SOCK SSH_CONNECTION DISPLAY"

set -g prefix C-s
set -g mouse on
set -g set-titles on
set -g set-titles-string '#(~/.dotfiles/tools/tmux/pane-title.sh #{pane_pid} #{pane_current_command} #S)'
set -g set-clipboard on
set -g allow-passthrough on
set -g history-limit 1000000

# ============================================================================
# NOTIFICATIONS
# ============================================================================

# Monitor activity in other windows
set -g monitor-activity off
set -g visual-activity off
set -g activity-action none

# Monitor bell signals in other windows (claude finish, long commands)
set -g monitor-bell on
set -g visual-bell off
set -g bell-action other
# afplay есть только на macOS. В Linux-контейнере безусловный хук форкал падающий
# процесс на каждый bell (claude/nvim) — micro-lag. Ставим хук только если afplay есть.
if-shell 'command -v afplay >/dev/null 2>&1' \
  "set-hook -g alert-bell 'run-shell \"afplay /System/Library/Sounds/Glass.aiff &\"'"

# for neovim
set -sg escape-time 0
set -g focus-events on

# VI mode
set-window-option -g mode-keys vi
set -g status-keys vi

# Автоматическое завершение выделения (мышь, дабл/трипл-клик, y) копирует,
# но НЕ выходит из copy-mode — не кидает вниз на ввод.
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection
bind -T copy-mode-vi y                 send-keys -X copy-selection
bind -T copy-mode-vi DoubleClick1Pane  select-pane \; send-keys -X select-word \; run-shell -d 0.3 \; send-keys -X copy-selection
bind -T copy-mode-vi TripleClick1Pane  select-pane \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-selection

# Enter — осознанный выход из copy-mode вниз (и копирует, если есть выделение).
# Дополнительно: q, Escape и Ctrl-c тоже выходят.
bind -T copy-mode-vi Enter  send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# Статус-бар
set -g status on
# set -g status off

set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

set -g status-interval 5
set -g status-position top
set -g status-justify left
set -g status-style bg=default

# Статус-бар (левая часть)
set -g status-left ''

# Статус-бар (правая часть) - показываем имя сессии и время
set -g status-right '#{?client_prefix,#[fg=colour9]#S #[fg=colour242]| #[fg=colour9]%H:%M ,#[fg=colour12]#S #[fg=colour242]| #[fg=default]%H:%M }'

# Активное окно
set -g window-status-current-format " ●#{?#{||:#{==:#{window_index},3},#{||:#{==:#{window_index},6},#{==:#{window_index},9}}}, ,}"
set -g window-status-current-style fg=colour9,bg=default

# Неактивные окна
set -g window-status-format " ●#{?#{||:#{==:#{window_index},3},#{||:#{==:#{window_index},6},#{==:#{window_index},9}}}, ,}"
set -g window-status-style fg=colour242,bg=default

# Подсветка окон с bell (claude finish, long commands)
set -g window-status-bell-style fg=colour2,bg=default

# Разделитель панелей
set -g pane-border-style fg=colour242
set -g pane-active-border-style fg=colour166

# Сообщения
set -g message-style fg=colour166,bg=default

# Режим выделения (copy-mode) - инверсия цветов терминала
set -g mode-style reverse

# Переменование окон
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# Terminal colors
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Synchronized output (DEC mode 2026): tmux оборачивает перерисовку панелей в atomic-кадры.
# Контейнерный TERM=xterm-256color НЕ несёт sync-cap (terminfo xterm-ghostty отсутствует),
# из-за чего ghostty рисует промежуточные/дублированные кадры при split. Фича применяется
# к клиенту в момент attach — после правки нужен detach/reattach сессии.
set -as terminal-features ",*:sync"

# SSH-транспорт DevPod (local-docker, ssh-провайдер, remote, plain `ssh …devpod`) калечит
# cud1=\n: на промежуточном PTY ssh-сервера идёт NL→CRLF, лишний \r кидает курсор в колонку 0
# при перерисовке → панели затирают друг друга. Баг ТОЛЬКО по ssh (на Маке и через `docker exec`
# его нет). Меняем cursor-down на чистый CSI \E[1B, неуязвимый к NL-трансляции.
# Scope=xterm-256color: ВСЕ ssh/devpod-подключения сводятся к нему (в контейнере нет terminfo
# xterm-ghostty → .zshrc делает fallback на xterm-256color), а локальный Мак — xterm-ghostty,
# поэтому он НЕ затрагивается. Источник: loft-sh/devpod#932.
set -ga terminal-overrides ',xterm-256color:cud1=\E[1B'

# ============================================================================
# AUTO-SAVE SESSIONS (requires TPM + plugins)
# ============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'              # восстанавливать сессии при старте tmux-сервера
set -g @continuum-save-interval '15'        # авто-сохранение каждые 15 минут (важно при SSH/DevPod-разрывах)
set -g @resurrect-capture-pane-contents 'off'
set -g @resurrect-strategy-nvim 'session'   # восстанавливать nvim-сессии, если есть :mksession

run '~/.tmux/plugins/tpm/tpm'

# ============================================================================
# tmux-thumbs (flash-стиль: метки по путям/хешам/URL на экране) — ставится через
# nix (tmuxPlugins.tmux-thumbs), НЕ через TPM (TPM собирал бы rust через cargo).
# prefix+f → появляются буквы-метки, жмёшь букву → токен копируется. Копия через
# OSC52 (Ghostty + allow-passthrough), без xclip. Опции @thumbs-* ДО run-shell.
# ============================================================================
set -g @thumbs-key f
set -g @thumbs-osc52 1
# Цвета (hex или имена). Два слоя: match = само совпадение, hint = буква-метка.
set -g @thumbs-hint-fg-color '#cb4b16'   # буква-метка: жжёный оранжево-красный (Solarized orange), как flash
set -g @thumbs-hint-bg-color 'default'   # без плашки под буквой — только цвет символа
set -g @thumbs-fg-color '#268bd2'        # совпадения: Solarized blue (accent — держит контраст и в light, и в dark)
set -g @thumbs-bg-color 'default'        # фон совпадений: прозрачный (выделяем цветом текста, не плашкой)
if-shell '[ -e ~/.nix-profile/share/tmux-plugins/tmux-thumbs/tmux-thumbs.tmux ]' \
  'run-shell ~/.nix-profile/share/tmux-plugins/tmux-thumbs/tmux-thumbs.tmux'
