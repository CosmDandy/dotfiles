disableStartupPopups: true
notARepository: skip
gui:
  skipDiscardChangeWarning: true
  skipStashWarning: true
  skipNoStagedFilesWarning: true
  skipRewordInEditorWarning: true
  showFileTree: true
  border: rounded
  showBottomLine: false
  showCommandLog: false
  nerdFontsVersion: "3"
  showFileIcons: false
  theme:
    activeBorderColor:
      - '#268bd2'
      - bold
    inactiveBorderColor:
      - '#586e75'
    optionsTextColor:
      - '#268bd2'
    unstagedChangesColor:
      - '#dc322f'
git:
  overrideGpg: True
  autoFetch: true
  mainBranches:
    # master оставлен: конфиг общий для всех репозиториев, а рабочие (kvt-*)
    # на GitLab по-прежнему живут на master/develop
    - main
    - master
    - stage
    - develop
  log:
    showGraph: always
os:
  editPreset: nvim
