disableStartupPopups: true
notARepository: skip
gui:
  skipDiscardChangeWarning: true
  skipStashWarning: true
  skipNoStagedFilesWarning: true
  skipRewordInEditorWarning: true
  showFileTree: true
  border: rounded
  showBottomLine: false
  showCommandLog: false
  nerdFontsVersion: "3"
  showFileIcons: false
  theme:
    activeBorderColor:
      - '#268bd2'
      - bold
    inactiveBorderColor:
      - '#586e75'
    optionsTextColor:
      - '#268bd2'
    selectedLineBgColor:
      - '#073642'
    cherryPickedCommitBgColor:
      - '#073642'
    cherryPickedCommitFgColor:
      - '#2aa198'
    markedBaseCommitBgColor:
      - '#073642'
    markedBaseCommitFgColor:
      - '#b58900'
    unstagedChangesColor:
      - '#dc322f'
    defaultFgColor:
      - '#839496'
git:
  overrideGpg: True
  autoFetch: true
  mainBranches:
    - master
    - stage
    - develop
  log:
    showGraph: always
os:
  editPreset: nvim
