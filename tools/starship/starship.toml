add_newline = false
palette = "solarized"
# $all — все модули в дефолтном порядке; ${custom.vm} выносим в начало 2-й строки (к ❯),
# чтобы server-иконка вставала как контейнерная, а не хвостом на 1-й строке.
format = "$all${custom.vm}$character"

[git_branch]
format = 'on [$branch(:$remote_branch)]($style) '

[git_status]
format = ''

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '

[status]
disabled = false
format = '[$status]($style) '

[username]
show_always = false
style_user = 'bold cyan'
style_root = 'bold red'
format = '[$user]($style) '

[hostname]
ssh_only = true
format = '[$hostname]($style) in '

[jobs]
symbol = '✦'
number_threshold = 1
format = '[$symbol$number]($style) '

[container]
symbol = '󰆧'
format = '[$symbol]($style) '

[custom.vm]
when = "systemd-detect-virt -v -q && ! systemd-detect-virt -c -q"
symbol = '󰒋'
format = '[$symbol]($style) '
style = 'bold yellow'
shell = ["bash", "--noprofile", "--norc"]

[python]
format = '[${symbol}(${version} )(\($virtualenv\))]($style) '
symbol = ' '

[golang]
format = '[$symbol($version )]($style) '
symbol = "\ue627 "

[rust]
format = '[$symbol($version )]($style) '
symbol = "\ue68b "

[kubernetes]
disabled = false
format = '[$symbol$context( \($namespace\))]($style) '
symbol = '☸ '

[terraform]
format = '[$symbol$workspace]($style) '
symbol = '󱁢 '

[docker_context]
format = '[$symbol$context]($style) '
only_with_files = true

[nix_shell]
format = '[$symbol$state]($style) '
symbol = ' '

[direnv]
disabled = false
symbol = ''
format = '[$allowed]($style) '
allowed_msg = ''
not_allowed_msg = '󰚄 allow'
denied_msg = '󰚄 denied'
style = 'bold yellow'

[helm]
format = '[$symbol($version )]($style) '

[aws]
format = '[$symbol($profile )(\($region\))]($style) '
symbol = ' '

[gcloud]
format = '[$symbol$project(\($region\))]($style) '
symbol = '󱇶 '

[azure]
disabled = false
format = '[$symbol($subscription )]($style) '
symbol = "\U000F0805 "

[battery]
full_symbol = '󰁹 '
charging_symbol = '󰂄 '
discharging_symbol = '󰂃 '
unknown_symbol = '󰁽 '
empty_symbol = '󰂎 '

[[battery.display]]
threshold = 20
style = 'bold red'

[cmd_duration]
min_time = 3_000
format = '[$duration]($style) '
style = 'yellow'

[sudo]
disabled = false
format = '[$symbol]($style) '
symbol = "\U000F0423 "
style = 'bold red'

[palettes.solarized]
# accent-цвета Solarized — читаемы и на light, и на dark фоне
red     = "#dc322f"
orange  = "#cb4b16"
yellow  = "#b58900"
green   = "#859900"
cyan    = "#2aa198"
blue    = "#268bd2"
violet  = "#6c71c4"
magenta = "#d33682"
purple  = "#6c71c4"
# base-тона (base03/02 тёмные, base2/3 светлые)
base03  = "#002b36"
base02  = "#073642"
base01  = "#586e75"
base00  = "#657b83"
base0   = "#839496"
base1   = "#93a1a1"
base2   = "#eee8d5"
base3   = "#fdf6e3"
