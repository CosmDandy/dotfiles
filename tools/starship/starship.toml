add_newline = false

[git_branch]
format = 'on [$branch(:$remote_branch)]($style) '

[git_status]
format = ''

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '

[status]
disabled = false
format = '[$status]($style) '

[username]
show_always = false
style_user = 'bold cyan'
style_root = 'bold red'
format = '[$user]($style) '

[hostname]
ssh_only = true
format = '[$hostname]($style) in '

[jobs]
symbol = 'Ô£ª'
number_threshold = 1
format = '[$symbol$number]($style) '

[container]
symbol = '¾░åª'
format = '[$symbol ]($style) '

[custom.vm]
when = "systemd-detect-virt -v -q && ! systemd-detect-virt -c -q"
symbol = '¾░Æï'
format = '[$symbol ]($style) '
style = 'bold yellow'
shell = ["bash", "--noprofile", "--norc"]

[python]
format = '[${symbol}(${version} )(\($virtualenv\))]($style) '
symbol = ' '

[golang]
format = '[$symbol($version )]($style) '
symbol = "\ue627 "

[rust]
format = '[$symbol($version )]($style) '
symbol = "\ue68b "

[kubernetes]
disabled = false
format = '[$symbol$context( \($namespace\))]($style) '
symbol = 'Ôÿ© '

[terraform]
format = '[$symbol$workspace]($style) '
symbol = '¾▒üó '

[docker_context]
format = '[$symbol$context]($style) '
only_with_files = true

[nix_shell]
format = '[$symbol$state]($style) '
symbol = ' '

[direnv]
disabled = false
symbol = ''
format = '[$allowed]($style) '
allowed_msg = ''
not_allowed_msg = '¾░Üä allow'
denied_msg = '¾░Üä denied'
style = 'bold yellow'

[helm]
format = '[$symbol($version )]($style) '

[aws]
format = '[$symbol($profile )(\($region\))]($style) '
symbol = ' '

[gcloud]
format = '[$symbol$project(\($region\))]($style) '
symbol = '¾▒çÂ '

[azure]
disabled = false
format = '[$symbol($subscription )]($style) '
symbol = "\U000F0805 "

[battery]
full_symbol = '¾░ü╣ '
charging_symbol = '¾░éä '
discharging_symbol = '¾░éâ '
unknown_symbol = '¾░ü¢ '
empty_symbol = '¾░éÄ '

[[battery.display]]
threshold = 20
style = 'bold red'

[cmd_duration]
min_time = 3_000
format = '[$duration]($style) '
style = 'yellow'

[sudo]
disabled = false
format = '[$symbol]($style) '
symbol = "\U000F0423 "
style = 'bold red'
