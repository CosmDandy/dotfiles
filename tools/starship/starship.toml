add_newline = false

[git_branch]
format = 'on [$branch(:$remote_branch)]($style) '

[git_status]
format = ''

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '

[status]
disabled = false
format = '[$status]($style) '

[hostname]
ssh_only = true
format = '[$hostname]($style) in '

[jobs]
symbol = 'Ô£ª'
threshold = 1
format = '[$symbol$number]($style) '

[container]
format = '[$symbol ]($style) '

[python]
format = '[${symbol}(${version} )(\($virtualenv\))]($style) '
symbol = ' '

[kubernetes]
disabled = false
format = '[$symbol$context( \($namespace\))]($style) '
symbol = 'Ôÿ© '

[terraform]
format = '[$symbol$workspace]($style) '
symbol = '¾▒üó '

[docker_context]
format = '[$symbol$context]($style) '
only_with_files = true

[nix_shell]
format = '[$symbol$state]($style) '
symbol = ' '

[helm]
format = '[$symbol($version )]($style)'

[aws]
format = '[$symbol($profile )(\($region\))]($style) '
symbol = ' '

[gcloud]
format = '[$symbol$project(\($region\))]($style) '
symbol = '¾▒çÂ '

[battery]
full_symbol = '¾░ü╣ '
charging_symbol = '¾░éä '
discharging_symbol = '¾░éâ '
unknown_symbol = '¾░ü¢ '
empty_symbol = '¾░éÄ '

[[battery.display]]
threshold = 20
style = 'bold red'

[cmd_duration]
min_time = 3_000
format = '[$duration]($style) '
style = 'yellow'
